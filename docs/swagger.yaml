definitions:
  api.CreateArticleRequest:
    properties:
      category_name:
        type: string
      tags:
        items:
          type: string
        type: array
      url:
        type: string
    required:
    - url
    type: object
  entity.ArticleResponse:
    properties:
      author:
        description: Html        *string              `json:"-"` // Explicitly exclude
          HTML from JSON/Swagger by default
        type: string
      category_id:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      is_offline:
        type: boolean
      llm_description:
        description: PlainText   *string              `json:"-"` // Explicitly exclude
          PlainText
        type: string
      og_image_url:
        type: string
      status:
        $ref: '#/definitions/entity.ArticleStatus'
      title:
        type: string
      updated_at:
        type: string
      url:
        type: string
      user_id:
        type: string
    type: object
  entity.ArticleStatus:
    enum:
    - 0
    - 1
    - 2
    type: integer
    x-enum-comments:
      StatusCompleted: Successfully processed
      StatusFailed: Processing failed
      StatusPending: Initial state or processing
    x-enum-varnames:
    - StatusPending
    - StatusCompleted
    - StatusFailed
  entity.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        maxLength: 50
        minLength: 2
        type: string
      password:
        maxLength: 72
        minLength: 7
        type: string
      role:
        enum:
        - 0
        - 1
        - 2
        type: integer
    required:
    - email
    - name
    - password
    type: object
  entity.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  entity.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/entity.UserPublic'
    type: object
  entity.RegisterRequest:
    properties:
      email:
        type: string
      name:
        maxLength: 50
        minLength: 2
        type: string
      password:
        maxLength: 72
        minLength: 7
        type: string
    required:
    - email
    - name
    - password
    type: object
  entity.UpdateEmailRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  entity.UpdateNameRequest:
    properties:
      name:
        maxLength: 50
        minLength: 2
        type: string
    required:
    - name
    type: object
  entity.UpdatePasswordRequest:
    properties:
      new_password:
        maxLength: 72
        minLength: 7
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  entity.UserPublic:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  entity.UserSelf:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        description: Role as string for clarity
        type: string
    type: object
  response.ErrorResponse:
    properties:
      code:
        example: "00001"
        type: string
      details: {}
      message:
        example: Error message
        type: string
    type: object
  response.PaginationResponse:
    properties:
      data:
        description: Data for the current page
      page:
        description: Current page number
        type: integer
      total:
        description: Total number of items
        type: integer
    type: object
  response.SuccessResponse:
    properties:
      code:
        description: Use a standard success code
        type: string
      data: {}
      message:
        type: string
    type: object
info:
  contact: {}
paths:
  /articles:
    post:
      consumes:
      - application/json
      description: Accepts a URL, optionally a category name and tags. Creates a placeholder
        article immediately and processes the full content in the background.
      parameters:
      - description: Article URL and optional metadata
        in: body
        name: article
        required: true
        schema:
          $ref: '#/definitions/api.CreateArticleRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Article accepted for processing, returns initial article data
            (with ID and processing status)
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.ArticleResponse'
              type: object
        "400":
          description: 'Validation error (URL format, etc. - code: 00004) or invalid
            JSON (code: 00003)'
          schema:
            allOf:
            - $ref: '#/definitions/response.ErrorResponse'
            - properties:
                details:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: 'Conflict - Article with this URL already exists (code: 02001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (failed to create placeholder, etc.
            - code: 00001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Submit a URL to save as an article
      tags:
      - articles
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns a JWT token upon successful login.
      parameters:
      - description: User login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/entity.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully logged in
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.LoginResponse'
              type: object
        "400":
          description: 'Validation error (code: 00004) or invalid JSON (code: 00003)'
          schema:
            allOf:
            - $ref: '#/definitions/response.ErrorResponse'
            - properties:
                details:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "401":
          description: 'Invalid email or password (code: 01002)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (code: 00001 or specific service error)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Log in a user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account based on the provided details.
      parameters:
      - description: User registration details
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/entity.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully registered user
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.UserPublic'
              type: object
        "400":
          description: 'Validation error (code: 00004) or invalid JSON (code: 00003)'
          schema:
            allOf:
            - $ref: '#/definitions/response.ErrorResponse'
            - properties:
                details:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "409":
          description: 'Email already registered (code: 01003)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (code: 00001 or specific service error)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /sse:
    get:
      description: Establishes an SSE connection to receive real-time updates (e.g.,
        article processing status).
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream established
          schema:
            type: string
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (failed to establish stream - code:
            00001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Establish Server-Sent Event connection
      tags:
      - sse
  /users/email:
    put:
      consumes:
      - application/json
      description: Updates the authenticated user's email address. Checks for email
        uniqueness.
      parameters:
      - description: New email address
        in: body
        name: email
        required: true
        schema:
          $ref: '#/definitions/entity.UpdateEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Email updated successfully
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: 'Validation error (code: 00004) or invalid JSON (code: 00003)'
          schema:
            allOf:
            - $ref: '#/definitions/response.ErrorResponse'
            - properties:
                details:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: 'Email already taken (code: 01005)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (code: 00001 or specific service error)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update user email
      tags:
      - users
  /users/name:
    put:
      consumes:
      - application/json
      description: Updates the authenticated user's display name.
      parameters:
      - description: New display name
        in: body
        name: name
        required: true
        schema:
          $ref: '#/definitions/entity.UpdateNameRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Name updated successfully
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: 'Validation error (code: 00004) or invalid JSON (code: 00003)'
          schema:
            allOf:
            - $ref: '#/definitions/response.ErrorResponse'
            - properties:
                details:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (code: 00001 or specific service error)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update user name
      tags:
      - users
  /users/password:
    put:
      consumes:
      - application/json
      description: Updates the authenticated user's password after verifying the old
        password.
      parameters:
      - description: Old and new password details
        in: body
        name: password
        required: true
        schema:
          $ref: '#/definitions/entity.UpdatePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password updated successfully
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: 'Validation error (code: 00004) or invalid JSON (code: 00003)'
          schema:
            allOf:
            - $ref: '#/definitions/response.ErrorResponse'
            - properties:
                details:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001) or incorrect
            old password (code: 01004)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (code: 00001 or specific service error)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update user password
      tags:
      - users
  /users/profile:
    get:
      description: Retrieves the profile information (ID, name, email, role, created_at)
        for the currently authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved user profile
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.UserSelf'
              type: object
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: 'User not found (code: 01007)" // Should not happen if token
            is valid'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (code: 00001 or specific service error)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get own user profile
      tags:
      - users
  /users/root:
    get:
      description: Retrieves a paginated list of all users. This endpoint requires
        root privileges.
      parameters:
      - default: 1
        description: Page number
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        maximum: 100
        minimum: 1
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved user list
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/response.PaginationResponse'
                  - properties:
                      data:
                        items:
                          $ref: '#/definitions/entity.UserPublic'
                        type: array
                    type: object
              type: object
        "400":
          description: 'Invalid pagination parameters (code: 00004)'
          schema:
            allOf:
            - $ref: '#/definitions/response.ErrorResponse'
            - properties:
                details:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: 'Forbidden (not root user - code: 01006)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (code: 00001 or specific service error)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get list of all users (Root only)
      tags:
      - users
      - root
    post:
      consumes:
      - application/json
      description: Creates a new user account. This endpoint requires root privileges.
      parameters:
      - description: New user details
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/entity.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created successfully
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.UserPublic'
              type: object
        "400":
          description: 'Validation error (code: 00004) or invalid JSON (code: 00003)'
          schema:
            allOf:
            - $ref: '#/definitions/response.ErrorResponse'
            - properties:
                details:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: 'Forbidden (not root user - code: 01006)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: 'Email already registered (code: 01003)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (code: 00001 or specific service error)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new user (Root only)
      tags:
      - users
      - root
  /users/root/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes a user account by ID. This endpoint requires root privileges.
      parameters:
      - description: User ID to delete
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User deleted successfully
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: 'Invalid user ID format (code: 00004)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: 'Forbidden (not root user - code: 01006)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: 'User not found (code: 01007)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (code: 00001 or specific service error)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a user (Root only)
      tags:
      - users
      - root
swagger: "2.0"
