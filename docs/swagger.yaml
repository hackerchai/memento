definitions:
  entity.AddTagsRequest:
    properties:
      tags:
        description: Requires at least one tag, each tag name is required
        items:
          type: string
        minItems: 1
        type: array
    required:
    - tags
    type: object
  entity.AppConfigResponse:
    properties:
      bypass_refer:
        type: boolean
      created_at:
        type: string
      custom_scrape_retry_times:
        type: integer
      custom_scrape_timeout_seconds:
        type: integer
      custom_user_agent:
        type: string
      custom_user_proxy:
        type: string
      extract_links:
        type: boolean
      id:
        type: string
      llm_auto_gen_abstract:
        type: boolean
      llm_auto_gen_tags:
        type: boolean
      llm_profile_id:
        type: string
      llm_provider:
        type: string
      locale:
        type: string
      scrape_img_offline:
        type: boolean
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  entity.ArticleDetailResponse:
    properties:
      author:
        type: string
      category:
        allOf:
        - $ref: '#/definitions/entity.CategoryResponse'
        description: 'TODO: Consider adding full Category/Tags details if needed'
      category_id:
        type: string
      created_at:
        type: string
      description:
        type: string
      html:
        description: Include HTML
        type: string
      id:
        type: string
      is_offline:
        type: boolean
      is_read:
        type: boolean
      is_starred:
        type: boolean
      llm_description:
        type: string
      og_image_url:
        type: string
      plain_text:
        description: Include PlainText
        type: string
      status:
        $ref: '#/definitions/entity.ArticleStatus'
      tags:
        description: Use TagResponse DTO
        items:
          $ref: '#/definitions/entity.TagResponse'
        type: array
      title:
        type: string
      updated_at:
        type: string
      url:
        type: string
      user_id:
        type: string
    type: object
  entity.ArticleResponse:
    properties:
      author:
        description: Html        *string              `json:"-"` // Explicitly exclude
          HTML from JSON/Swagger by default
        type: string
      category_id:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      is_offline:
        type: boolean
      is_read:
        description: New field
        type: boolean
      is_starred:
        description: New field
        type: boolean
      llm_description:
        description: PlainText   *string              `json:"-"` // Explicitly exclude
          PlainText
        type: string
      og_image_url:
        type: string
      status:
        $ref: '#/definitions/entity.ArticleStatus'
      title:
        type: string
      updated_at:
        type: string
      url:
        type: string
      user_id:
        type: string
    type: object
  entity.ArticleStatus:
    enum:
    - 0
    - 1
    - -1
    - 2
    - 3
    type: integer
    x-enum-comments:
      StatusAutoTagged: Successfully auto-tagged by LLM
      StatusCompleted: Successfully processed
      StatusFailed: Processing failed
      StatusLLMSummarized: Successfully summarized by LLM
      StatusPending: Initial state or processing
    x-enum-varnames:
    - StatusPending
    - StatusCompleted
    - StatusFailed
    - StatusLLMSummarized
    - StatusAutoTagged
  entity.CategoryDetailResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      slug:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  entity.CategoryResponse:
    properties:
      name:
        type: string
      slug:
        type: string
    type: object
  entity.CreateArticleRequest:
    properties:
      category_name:
        type: string
      tags:
        items:
          type: string
        type: array
      url:
        type: string
    required:
    - url
    type: object
  entity.CreateCategoryRequest:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  entity.CreateCategoryRootRequest:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
      target_user_id:
        type: string
    required:
    - name
    - target_user_id
    type: object
  entity.CreateTagRequest:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  entity.CreateTagRootRequest:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
      target_user_id:
        type: string
    required:
    - name
    - target_user_id
    type: object
  entity.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        maxLength: 50
        minLength: 2
        type: string
      password:
        maxLength: 72
        minLength: 7
        type: string
      role:
        enum:
        - 0
        - 1
        - 2
        type: integer
    required:
    - email
    - name
    - password
    type: object
  entity.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  entity.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/entity.UserPublic'
    type: object
  entity.RegisterRequest:
    properties:
      email:
        type: string
      name:
        maxLength: 50
        minLength: 2
        type: string
      password:
        maxLength: 72
        minLength: 7
        type: string
    required:
    - email
    - name
    - password
    type: object
  entity.RemoveTagsRequest:
    properties:
      tags:
        description: Requires at least one tag, each tag name is required
        items:
          type: string
        minItems: 1
        type: array
    required:
    - tags
    type: object
  entity.TagDetailResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      slug:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  entity.TagResponse:
    properties:
      name:
        type: string
      slug:
        type: string
    type: object
  entity.UpdateAppConfigRequest:
    properties:
      bypass_refer:
        type: boolean
      custom_scrape_retry_times:
        type: integer
      custom_scrape_timeout_seconds:
        type: integer
      custom_user_agent:
        type: string
      custom_user_proxy:
        type: string
      extract_links:
        type: boolean
      llm_auto_gen_abstract:
        type: boolean
      llm_auto_gen_tags:
        type: boolean
      llm_profile_id:
        description: Use pointer for optional UUID
        type: string
      llm_provider:
        type: string
      locale:
        description: Added locale
        maxLength: 10
        type: string
      scrape_img_offline:
        type: boolean
    type: object
  entity.UpdateArticleCategoryRequest:
    properties:
      category:
        description: Requires the Name of the new category
        type: string
    required:
    - category
    type: object
  entity.UpdateArticleStatusRequest:
    properties:
      is_read:
        type: boolean
      is_starred:
        type: boolean
    type: object
  entity.UpdateEmailRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  entity.UpdateNameRequest:
    properties:
      name:
        maxLength: 50
        minLength: 2
        type: string
    required:
    - name
    type: object
  entity.UpdatePasswordRequest:
    properties:
      new_password:
        maxLength: 72
        minLength: 7
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  entity.UserPublic:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  entity.UserSelf:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        description: Role as string for clarity
        type: string
    type: object
  response.ErrorResponse:
    properties:
      code:
        example: "00001"
        type: string
      details: {}
      message:
        example: Error message
        type: string
    type: object
  response.PaginationResponse:
    properties:
      data:
        description: Data for the current page
      page:
        description: Current page number
        type: integer
      total:
        description: Total number of items
        type: integer
    type: object
  response.SuccessResponse:
    properties:
      code:
        description: Use a standard success code
        type: string
      data: {}
      message:
        type: string
    type: object
info:
  contact: {}
paths:
  /articles:
    get:
      description: Retrieves a paginated list of articles belonging to the authenticated
        user. Allows filtering by read and starred status.
      parameters:
      - default: 1
        description: Page number
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        maximum: 100
        minimum: 1
        name: per_page
        type: integer
      - description: Filter by read status (true/false)
        in: query
        name: is_read
        type: boolean
      - description: Filter by starred status (true/false)
        in: query
        name: is_starred
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved articles
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/response.PaginationResponse'
                  - properties:
                      data:
                        items:
                          $ref: '#/definitions/entity.ArticleResponse'
                        type: array
                    type: object
              type: object
        "400":
          description: 'Invalid pagination or filter parameters (code: 00004)'
          schema:
            allOf:
            - $ref: '#/definitions/response.ErrorResponse'
            - properties:
                details:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (code: 00001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List user's articles
      tags:
      - articles
    post:
      consumes:
      - application/json
      description: Accepts a URL, optionally a category name and tags. Creates a placeholder
        article immediately and processes the full content in the background.
      parameters:
      - description: Article URL and optional metadata
        in: body
        name: article
        required: true
        schema:
          $ref: '#/definitions/entity.CreateArticleRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Article accepted for processing, returns initial article data
            (with ID and processing status)
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.ArticleResponse'
              type: object
        "400":
          description: 'Validation error (URL format, etc. - code: 00004) or invalid
            JSON (code: 00003)'
          schema:
            allOf:
            - $ref: '#/definitions/response.ErrorResponse'
            - properties:
                details:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: 'Conflict - Article with this URL already exists (code: 02001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (failed to create placeholder, etc.
            - code: 00001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Submit a URL to save as an article
      tags:
      - articles
  /articles/{id}:
    delete:
      description: Deletes a specific article belonging to the authenticated user.
      parameters:
      - description: Article ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Successfully deleted article
        "400":
          description: 'Invalid Article ID format (code: 00004)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: 'Article not found (code: 02001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (code: 00001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete an article
      tags:
      - articles
    get:
      description: Retrieves details of a specific article belonging to the authenticated
        user, including category and tags.
      parameters:
      - description: Article ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved article with details
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.ArticleDetailResponse'
              type: object
        "400":
          description: 'Invalid Article ID format (code: 00004)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: 'Article not found (code: 02001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (code: 00001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a specific article
      tags:
      - articles
    patch:
      consumes:
      - application/json
      description: Updates the is_read and/or is_starred flags for a specific article.
      parameters:
      - description: Article ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update (at least one required)
        in: body
        name: status
        required: true
        schema:
          $ref: '#/definitions/entity.UpdateArticleStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated article status
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.ArticleResponse'
              type: object
        "400":
          description: 'Invalid Article ID format, invalid JSON, or no fields provided
            (code: 00004/00003)'
          schema:
            allOf:
            - $ref: '#/definitions/response.ErrorResponse'
            - properties:
                details:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: 'Article not found (code: 02001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (code: 00001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update article read/starred status
      tags:
      - articles
  /articles/{id}/category:
    patch:
      consumes:
      - application/json
      description: Updates the category associated with a specific article.
      parameters:
      - description: Article ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: New category name
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/entity.UpdateArticleCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated category and returned updated article
            details
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.ArticleDetailResponse'
              type: object
        "400":
          description: 'Invalid Article ID format, invalid JSON, or validation error
            (e.g., category not found/invalid) (code: 00004/00003)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: 'Article not found or target category not found for user (code:
            02001/00004)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (code: 00001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Change an article's category
      tags:
      - articles
  /articles/{id}/rescrape:
    post:
      description: Triggers the background process to fetch and parse the article
        content again for a specific article.
      parameters:
      - description: Article ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Article accepted for re-processing, returns article data with
            pending status
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.ArticleResponse'
              type: object
        "400":
          description: 'Invalid Article ID format (code: 00004)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: 'Article not found (code: 02001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (code: 00001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Re-scrape an article
      tags:
      - articles
  /articles/{id}/tags:
    delete:
      consumes:
      - application/json
      description: Removes one or more tags from a specific article. Ignores tags
        that are not associated or do not exist.
      parameters:
      - description: Article ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: List of tag names to remove
        in: body
        name: tags
        required: true
        schema:
          $ref: '#/definitions/entity.RemoveTagsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully removed tags (if found) and returned updated article
            details
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.ArticleDetailResponse'
              type: object
        "400":
          description: 'Invalid Article ID format, invalid JSON, or validation error
            on tags (code: 00004/00003)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: 'Article not found (code: 02001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (failed to remove tags, etc. - code:
            00001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove tags from an article
      tags:
      - articles
    post:
      consumes:
      - application/json
      description: Adds one or more tags to a specific article. If tags don't exist
        for the user, they are created.
      parameters:
      - description: Article ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: List of tag names to add
        in: body
        name: tags
        required: true
        schema:
          $ref: '#/definitions/entity.AddTagsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully added tags and returned updated article details
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.ArticleDetailResponse'
              type: object
        "400":
          description: 'Invalid Article ID format, invalid JSON, or validation error
            on tags (code: 00004/00003)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: 'Unauthorized (invalid/missing token - code: 01001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: 'Article not found (code: 02001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (failed to add tags, etc. - code: 00001)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add tags to an article
      tags:
      - articles
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns a JWT token upon successful login.
      parameters:
      - description: User login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/entity.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully logged in
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.LoginResponse'
              type: object
        "400":
          description: 'Validation error (code: 00004) or invalid JSON (code: 00003)'
          schema:
            allOf:
            - $ref: '#/definitions/response.ErrorResponse'
            - properties:
                details:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "401":
          description: 'Invalid email or password (code: 01002)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (code: 00001 or specific service error)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Log in a user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account based on the provided details.
      parameters:
      - description: User registration details
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/entity.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully registered user
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.UserPublic'
              type: object
        "400":
          description: 'Validation error (code: 00004) or invalid JSON (code: 00003)'
          schema:
            allOf:
            - $ref: '#/definitions/response.ErrorResponse'
            - properties:
                details:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "409":
          description: 'Email already registered (code: 01003)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 'Internal server error (code: 00001 or specific service error)'
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /categories:
    get:
      consumes:
      - application/json
      description: Retrieves a paginated list of categories for the authenticated
        user.
      parameters:
      - default: 1
        description: Page number
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        maximum: 100
        minimum: 1
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved categories
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  allOf:
